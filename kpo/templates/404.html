{% extends "layout.html" %}
{% block content %}
<div class="error-page">
  <div class="error-page__code">404</div>
  <div class="error-page__icon"><i class="fa-regular fa-face-frown"></i></div>
  <h1 class="error-page__title">Stranica koju tražite ne postoji</h1>
  <p class="error-page__desc">Proverite da li ste uneli ispravnu adresu ili se vratite na početnu stranicu.</p>
  {% if error_info %}<p class="error-page__info">{{ error_info }}</p>{% endif %}
  <div class="error-page__actions">
    <a class="inv-btn inv-btn--primary" href="{{ url_for('main.home') }}">
      <i class="fa-solid fa-house"></i> Početna
    </a>
    <button class="inv-btn inv-btn--outline" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i> Nazad
    </button>
  </div>
</div>
{% endblock content%}
